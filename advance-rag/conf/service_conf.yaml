# b-knowledge RAG service configuration
# Values here are defaults; override via environment variables.
# The config_utils.py reads this file and merges with local.service_conf.yaml.

ragflow:
  host: "0.0.0.0"
  http_port: 9380

# Database (PostgreSQL) — override via DB_TYPE, DB_HOST, etc.
postgres:
  name: "b_knowledge"
  user: "postgres"
  password: ""
  host: "localhost"
  port: 5432

# Vector DB (OpenSearch) — override via VECTORDB_HOST, VECTORDB_PASSWORD env vars
vectordb:
  hosts: "http://localhost:9201"
  username: "admin"
  password: "OpenSearch@123"

# S3-Compatible Storage (RustFS / MinIO / etc.) — override via S3_HOST, S3_ACCESS_KEY, S3_SECRET_KEY env vars
s3:
  name: "s3"
  user: "rustfsadmin"
  password: "rustfsadmin"
  host: "localhost:9000"
  bucket: "knowledge"

# Redis — override via REDIS_HOST, REDIS_PORT, REDIS_PASSWORD env vars
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 1

# User default LLM (system-level)
user_default_llm:
  factory: ""
  api_key: ""
  base_url: ""
  default_models:
    chat_model: ""
    embedding_model: ""
    rerank_model: ""
    asr_model: ""
    image2text_model: ""
