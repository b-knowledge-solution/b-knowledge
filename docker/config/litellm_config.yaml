# ==========================================================================
# LiteLLM Proxy Configuration
# OpenAI-compatible API server proxying to Ollama
# ==========================================================================
# Docs: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # --------------------------------------------------------------------------
  # Chat / Vision model — supports text + image input
  # --------------------------------------------------------------------------
  - model_name: qwen3.5-tune
    litellm_params:
      model: ollama/qwen3.5-tune:4b
      api_base: http://host.docker.internal:11434
      timeout: 120
      stream_timeout: 60
    model_info:
      supports_vision: True

  # --------------------------------------------------------------------------
  # Embedding model
  # --------------------------------------------------------------------------
  - model_name: qwen3-embedding
    litellm_params:
      model: ollama/qwen3-embedding:4b
      api_base: http://host.docker.internal:11434
    model_info:
      mode: embedding
      base_model: qwen3-embedding:4b

# General settings
general_settings:
  master_key: sk-litellm-master-key  # Change in production!
  database_url: null                  # Optional: PostgreSQL for usage tracking

litellm_settings:
  drop_params: true       # Drop unsupported params instead of erroring
  set_verbose: false
  num_retries: 2
  request_timeout: 300    # 5 min timeout for slow local models
