# Demo All-in-One Nginx Configuration
#
# Serves the compiled React/Vite SPA and proxies /api/* to the backend
# running on localhost:3001 (same container). Based on frontend-docker.conf
# but uses localhost instead of Docker service name "backend".

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check endpoint ────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── API reverse proxy → backend on localhost (same container) ───────────
    # All /api/* requests are forwarded to the backend; frontend code uses
    # relative paths so no CORS issues arise.
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        # WebSocket / SSE support (used by chat streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client IP so backend audit logs record the browser IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable request/response buffering for SSE streams
        proxy_buffering off;
        proxy_cache off;

        # Generous timeouts for long-running LLM streaming responses
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # ── Socket.IO WebSocket support ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── Static asset caching ─────────────────────────────────────────────────
    # Hashed filenames get long-lived cache; HTML files are never cached
    # so new deployments take effect immediately.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA fallback — all non-asset routes go to index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
