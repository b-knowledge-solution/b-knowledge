# ==========================================================================
# LiteLLM Proxy — OpenAI-compatible API server
# ==========================================================================
# Proxies requests to local Ollama (or any LLM provider) via a unified
# OpenAI-compatible API. Use this alongside docker-compose-base.yml.
#
# Usage:
#   docker compose -f docker-compose-litellm.yml up -d
#
# Default models (via Ollama on host):
#   - qwen3.5-tune:4b  → chat + vision
#   - qwen3-embedding:4b → embeddings
#
# API endpoint: http://localhost:4000/v1
# API key:      sk-litellm-master-key (change in production!)

services:
  # ==========================================================================
  # LiteLLM Proxy (MIT License)
  # https://github.com/BerriAI/litellm
  # ==========================================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: kb-litellm
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      - LITELLM_LOG_LEVEL=${LITELLM_LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - kb-network

networks:
  kb-network:
    driver: bridge
