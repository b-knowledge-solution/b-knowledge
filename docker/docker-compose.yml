# Knowledge Base - Docker Compose Configuration
# Infrastructure (PostgreSQL, Valkey, OpenSearch, RustFS) is included from docker-compose-base.yml
# This file only contains the application services that we build and develop.
#
# Resource limits tuned for a 4-core / 8 GB RAM server.
# Override via docker-compose.override.yml for larger machines.

include:
  - path: docker-compose-base.yml
    env_file: .env

services:
  # ==========================================================================
  # Knowledge Base Backend
  # ==========================================================================
  backend:
    image: ${BACKEND_IMAGE:-kb-backend}:${BACKEND_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 512m
    mem_reservation: 256m
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:3001"
    expose:
      - "3001"
    volumes:
      - app_logs:/app/logs
      - backend_data:/app/.data
      # Mount config directory for system-tools.config.json & ragflow.config.json
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - kb-network

  # ==========================================================================
  # RAG Task Executor (background worker for document parsing)
  # ==========================================================================
  task-executor:
    image: ${RAG_IMAGE:-kb-worker}:${RAG_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 2g
    mem_reservation: 1g
    depends_on:
      backend:
        condition: service_healthy
      valkey:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Per-service identity — all other vars come from .env
      WORKER_MODE: task-executor
      LOG_PREFIX: task-executor
    volumes:
      - app_logs:/app/logs
      # Share HuggingFace model cache to warm up sentence-transformers at startup
      - hf-cache:/root/.cache/huggingface
    networks:
      - kb-network

  # ==========================================================================
  # Connector Sync Worker (syncs external sources via Python connectors)
  # ==========================================================================
  connector-sync-worker:
    image: ${RAG_IMAGE:-kb-worker}:${RAG_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 1g
    mem_reservation: 512m
    depends_on:
      backend:
        condition: service_healthy
      valkey:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Per-service identity — all other vars come from .env
      WORKER_MODE: connector-sync
      LOG_PREFIX: connector-sync-worker
    volumes:
      - app_logs:/app/logs
    networks:
      - kb-network

  # ==========================================================================
  # Document Converter Worker (Office -> PDF conversion via LibreOffice)
  # ==========================================================================
  converter:
    image: ${CONVERTER_IMAGE:-kb-converter}:${CONVERTER_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 768m
    mem_reservation: 256m
    depends_on:
      backend:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # POLL_INTERVAL re-maps CONVERTER_POLL_INTERVAL — internal var name differs from .env key
      POLL_INTERVAL: ${CONVERTER_POLL_INTERVAL:-30}
      LOG_PREFIX: converter
    volumes:
      - converter_data:/app/.data
      - app_logs:/app/logs
    networks:
      - kb-network

  # ==========================================================================
  # Frontend (React/Vite SPA served by nginx:stable-alpine)
  # ==========================================================================
  frontend:
    image: ${FRONTEND_IMAGE:-kb-frontend}:${FRONTEND_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    mem_reservation: 64m
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - kb-network

# ==========================================================================
# Volumes (app-only — infrastructure volumes are in docker-compose-base.yml)
# ==========================================================================
volumes:
  app_logs:
    driver: local
  backend_data:
    driver: local
  converter_data:
    driver: local
  hf-cache:
    driver: local
