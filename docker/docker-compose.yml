# Knowledge Base - Docker Compose Configuration
# This file sets up the complete infrastructure for the Knowledge Base system

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:17-alpine
    container_name: kb-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-knowledge_base}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-knowledge_base}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kb-network

  # ==========================================================================
  # Redis Session Store
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - kb-network

  # ==========================================================================
  # Elasticsearch (vector + text search for RAG chunks)
  # ==========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: kb-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD:-elastic123}
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ES_PASSWORD:-elastic123} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kb-network

  # ==========================================================================
  # MinIO (object storage for uploaded documents)
  # ==========================================================================
  minio:
    image: minio/minio:latest
    container_name: kb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - kb-network

  # ==========================================================================
  # Knowledge Base Backend
  # ==========================================================================
  backend:
    build:
      context: ../be
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-knowledge-base-backend}:${BACKEND_VERSION:-latest}
    container_name: kb-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DB host to use Docker network
      DB_HOST: postgres
      REDIS_HOST: redis
      RAG_SERVICE_URL: http://rag-api:9380
    ports:
      - "${PORT:-3001}:3001"
    expose:
      - "3001"
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/.data
      # Mount config directory for system-tools.config.json & ragflow.config.json
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - kb-network

  # ==========================================================================
  # Python RAG API Service
  # ==========================================================================
  rag-api:
    build:
      context: ../py-rag
      dockerfile: Dockerfile
    image: ${RAG_IMAGE:-b-knowledge-rag}:${RAG_VERSION:-latest}
    container_name: kb-rag-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-knowledge_base}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ES_HOST: http://elasticsearch:9200
      ES_PASSWORD: ${ES_PASSWORD:-elastic123}
      MINIO_HOST: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      RAG_PROJECT_BASE: /app
      PYTHONPATH: /app
    ports:
      - "${RAG_PORT:-9380}:9380"
    expose:
      - "9380"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9380/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kb-network

  # ==========================================================================
  # RAG Task Executor (background worker for document parsing)
  # ==========================================================================
  task-executor:
    build:
      context: ../py-rag
      dockerfile: Dockerfile
    image: ${RAG_IMAGE:-b-knowledge-rag}:${RAG_VERSION:-latest}
    container_name: kb-task-executor
    restart: unless-stopped
    command: ["python", "-m", "executor_wrapper"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-knowledge_base}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ES_HOST: http://elasticsearch:9200
      ES_PASSWORD: ${ES_PASSWORD:-elastic123}
      MINIO_HOST: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      RAG_PROJECT_BASE: /app
      PYTHONPATH: /app
    networks:
      - kb-network

# ==========================================================================
# Networks
# ==========================================================================
networks:
  kb-network:
    driver: bridge

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  es_data:
    driver: local
  minio_data:
    driver: local
  backend_logs:
    driver: local
  backend_data:
    driver: local
