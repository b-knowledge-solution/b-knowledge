# Knowledge Base - Docker Compose Configuration
# Infrastructure (PostgreSQL, Valkey, OpenSearch, RustFS) is included from docker-compose-base.yml
# This file only contains the application services that we build and develop.
#
# Resource limits tuned for a 4-core / 8 GB RAM server.
# Override via docker-compose.override.yml for larger machines.

include:
  - path: docker-compose-base.yml
    env_file: .env

services:
  # ==========================================================================
  # Knowledge Base Backend
  # ==========================================================================
  backend:
    build:
      context: ../be
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-knowledge-base-backend}:${BACKEND_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 512m
    mem_reservation: 256m
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      VECTORDB_HOST: http://opensearch:9201
      VECTORDB_PASSWORD: ${VECTORDB_PASSWORD:-OpenSearch@123}
      S3_HOST: rustfs:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      S3_BUCKET: ${S3_BUCKET:-knowledge}
      S3_PREFIX_PATH: ${S3_PREFIX_PATH:-}
      LOG_DIR: ${LOG_DIR:-/app/logs}
    ports:
      - "${PORT:-3001}:3001"
    expose:
      - "3001"
    volumes:
      - app_logs:/app/logs
      - backend_data:/app/.data
      # Mount config directory for system-tools.config.json & ragflow.config.json
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - kb-network

  # ==========================================================================
  # RAG Task Executor (background worker for document parsing)
  # ==========================================================================
  task-executor:
    build:
      context: ../advance-rag
      dockerfile: Dockerfile
    image: ${RAG_IMAGE:-b-knowledge-rag}:${RAG_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 2g
    mem_reservation: 1g
    command: ["python", "-m", "executor_wrapper"]
    depends_on:
      backend:
        condition: service_healthy
      valkey:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-knowledge_base}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DOC_ENGINE: opensearch
      VECTORDB_HOST: http://opensearch:9201
      VECTORDB_PASSWORD: ${VECTORDB_PASSWORD:-OpenSearch@123}
      S3_HOST: rustfs:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      S3_BUCKET: ${S3_BUCKET:-knowledge}
      S3_PREFIX_PATH: ${S3_PREFIX_PATH:-}
      RAG_PROJECT_BASE: /app
      PYTHONPATH: /app
      # Worker scaling: tune per-instance concurrency via .env
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-5}
      MAX_CONCURRENT_CHUNK_BUILDERS: ${MAX_CONCURRENT_CHUNK_BUILDERS:-1}
      MAX_CONCURRENT_MINIO: ${MAX_CONCURRENT_MINIO:-10}
      MAX_CONCURRENT_CHATS: ${MAX_CONCURRENT_CHATS:-10}
      TASK_MAX_RETRIES: ${TASK_MAX_RETRIES:-3}
      OPENSEARCH_POOL_MAXSIZE: ${OPENSEARCH_POOL_MAXSIZE:-10}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      DOC_BULK_SIZE: ${DOC_BULK_SIZE:-4}
      WORKER_HEARTBEAT_TIMEOUT: ${WORKER_HEARTBEAT_TIMEOUT:-120}
      LOG_PREFIX: task-executor
      LOG_ROTATION: ${LOG_ROTATION:-50 MB}
      LOG_RETENTION: ${LOG_RETENTION:-30 days}
      LOG_COMPRESSION: ${LOG_COMPRESSION:-zip}
      LOG_DIR: ${LOG_DIR:-/app/logs}
    volumes:
      - app_logs:/app/logs
    networks:
      - kb-network

  # ==========================================================================
  # Connector Sync Worker (syncs external sources via Python connectors)
  # ==========================================================================
  connector-sync-worker:
    build:
      context: ../advance-rag
      dockerfile: Dockerfile
    image: ${RAG_IMAGE:-b-knowledge-rag}:${RAG_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 1g
    mem_reservation: 512m
    command: ["python", "connector_sync_worker.py"]
    depends_on:
      backend:
        condition: service_healthy
      valkey:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-knowledge_base}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DOC_ENGINE: opensearch
      VECTORDB_HOST: http://opensearch:9201
      VECTORDB_PASSWORD: ${VECTORDB_PASSWORD:-OpenSearch@123}
      S3_HOST: rustfs:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      S3_BUCKET: ${S3_BUCKET:-knowledge}
      S3_PREFIX_PATH: ${S3_PREFIX_PATH:-}
      RAG_PROJECT_BASE: /app
      PYTHONPATH: /app
      LOG_PREFIX: connector-sync-worker
      LOG_ROTATION: ${LOG_ROTATION:-50 MB}
      LOG_RETENTION: ${LOG_RETENTION:-30 days}
      LOG_COMPRESSION: ${LOG_COMPRESSION:-zip}
      LOG_DIR: ${LOG_DIR:-/app/logs}
    volumes:
      - app_logs:/app/logs
    networks:
      - kb-network

  # ==========================================================================
  # Document Converter Worker (Office -> PDF conversion via LibreOffice)
  # ==========================================================================
  converter:
    build:
      context: ../converter
      dockerfile: Dockerfile
    image: ${CONVERTER_IMAGE:-b-knowledge-converter}:${CONVERTER_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 768m
    mem_reservation: 256m
    depends_on:
      backend:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POLL_INTERVAL: ${CONVERTER_POLL_INTERVAL:-30}
      LOG_PREFIX: converter
      S3_HOST: rustfs:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      S3_BUCKET: ${S3_BUCKET:-knowledge}
      S3_PREFIX_PATH: ${S3_PREFIX_PATH:-}
      LOG_DIR: ${LOG_DIR:-/app/logs}
    volumes:
      - converter_data:/app/.data
      - app_logs:/app/logs
    networks:
      - kb-network

  # ==========================================================================
  # Embedding Worker (local sentence-transformers embedding service)
  # ==========================================================================
  embedding-worker:
    # Uses the same image as task-executor (advance-rag)
    build:
      context: ../advance-rag
      dockerfile: Dockerfile
    image: ${RAG_IMAGE:-b-knowledge-rag}:${RAG_VERSION:-latest}
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 2g
    mem_reservation: 1g
    command: ["python", "-m", "embedding_worker"]
    depends_on:
      valkey:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-knowledge_base}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Local embedding configuration
      LOCAL_EMBEDDING_ENABLE: ${LOCAL_EMBEDDING_ENABLE:-false}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-}
      LOCAL_EMBEDDING_PATH: ${LOCAL_EMBEDDING_PATH:-}
      PYTHONPATH: /app
      LOG_PREFIX: embedding-worker
      LOG_ROTATION: ${LOG_ROTATION:-50 MB}
      LOG_RETENTION: ${LOG_RETENTION:-30 days}
      LOG_COMPRESSION: ${LOG_COMPRESSION:-zip}
      LOG_DIR: ${LOG_DIR:-/app/logs}
    volumes:
      - app_logs:/app/logs
      # Persistent HuggingFace model cache -- survives container restarts (per D-06)
      - hf-cache:/root/.cache/huggingface
    networks:
      - kb-network
    # Each worker loads model independently (~600MB RAM per D-10)
    # Scale by running multiple replicas: docker compose up --scale embedding-worker=3
    deploy:
      resources:
        limits:
          memory: 2G

# ==========================================================================
# Volumes (app-only — infrastructure volumes are in docker-compose-base.yml)
# ==========================================================================
volumes:
  app_logs:
    driver: local
  backend_data:
    driver: local
  converter_data:
    driver: local
  hf-cache:
    driver: local
