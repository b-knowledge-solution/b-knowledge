# CI pipeline: install, build, and test all workspaces (Node.js + Python)
# Includes ISO 13485 / IEC 62304 compliance test verification
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: npm ci

    - name: Build workspaces
      run: npm run build --if-present
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'

    - name: Run backend tests (unit + compliance)
      run: npm test -w be -- --reporter=verbose
      env:
        NODE_ENV: test

    - name: Run frontend unit tests
      run: npm run test:run -w fe -- --reporter=verbose
      env:
        NODE_ENV: test

    - name: Run advance-rag tests
      working-directory: advance-rag
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install -e . 2>/dev/null || true
        pip install pytest pytest-cov pytest-mock
        python -m pytest tests/ --tb=short -q

    - name: Run converter tests
      working-directory: converter
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install -e . 2>/dev/null || true
        pip install pytest pytest-cov pytest-mock
        python -m pytest tests/ --tb=short -q

    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          be/coverage/
          fe/coverage/
